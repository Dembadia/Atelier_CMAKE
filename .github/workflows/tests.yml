name: Automatisation des tests

on: push

jobs:
  Compilation:
    runs-on: ubuntu-latest
    steps:
    

      - name: Compilation
        run: |
          mkdir build
          cd build
          cmake ..
          make
          make test

  Test_Add:
    runs-on: ubuntu-latest
    needs: Compilation
    steps:
      

      - name: Test fonction add
        run: |
          mkdir build
          cd build
          cmake ..
          make
          ./src/calculator add 10 5

