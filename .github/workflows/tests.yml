name: Automatisation des tests

on: push

jobs:
  Compilation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Compilation
        run: |
          mkdir build
          cd build
          cmake ..
          make
          make test

  Test_Add:
    runs-on: ubuntu-latest
    needs: Compilation
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Test fonction add
        run: |
          mkdir build
          cd build
          cmake ..
          make
          ./src/calculator add 10 5

  Test_Div:
    runs-on: ubuntu-latest
    needs: Compilation
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Test fonction div
        run: |
          mkdir build
          cd build
          cmake ..
          make
          ./src/calculator div 10 5

  Test_Mul:
    runs-on: ubuntu-latest
    needs: Compilation
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Test fonction mul
        run: |
          mkdir build
          cd build
          cmake ..
          make
          ./src/calculator mul 10 5

  Test_Sub:
    runs-on: ubuntu-latest
    needs: Compilation
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Test fonction sub
        run: |
          mkdir build
          cd build
          cmake ..
          make
          ./src/calculator sub 10 5
